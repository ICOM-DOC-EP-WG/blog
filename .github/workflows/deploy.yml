name: Deploy Static SvelteKit Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 25

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        env:
          BASE_PATH: ${{ vars.BASE_PATH || '' }}
        run: npm run build

      - name: Prevent GitHub Jekyll Processing
        run: touch build/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'build/'  # Ensure this matches your SvelteKit output directory

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5